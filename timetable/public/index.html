<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timetable Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 1. Password Login Screen -->
  <div class="login-container" id="login-screen">
    <div class="login-card">
      <h2 class="login-title">Access Control</h2>
      <p class="login-subtitle">Enter password to unlock daily vestibule</p>
      <form id="login-form" class="login-form">
        <input type="password" id="password-input" class="password-input" placeholder="Enter Password" required>
        <button type="submit" class="login-button">Unlock</button>
      </form>
      <p class="error-message" id="login-error"></p>
    </div>
  </div>

  <!-- 2. Main Timetable Content (Hidden initially) -->
  <div class="app-container hidden" id="app-content">
    <header class="app-header">
      <div class="title-section">
        <h1 class="app-title">Timetable</h1>
        <p class="app-subtitle">Daily discipline schedule</p>
      </div>
      <div class="header-actions">
        <button id="lock-button" class="lock-button">Lock</button>
      </div>
    </header>

    <main class="app-main">
      <div class="date-bar">
        <div class="date-selector">
          <input type="date" id="date-picker" class="date-input">
        </div>
      </div>

      <div class="status-bar">
        <span class="status-badge" id="active-count">0 Tasks</span>
        <span class="status-date" id="formatted-date">--</span>
      </div>

      <div class="tasks-list" id="tasks-container">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading schedule...</p>
        </div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
